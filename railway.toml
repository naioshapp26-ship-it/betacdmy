# Railway deployment configuration for Betacademy SaaS
# Docs: https://docs.railway.com/config-as-code/reference

[build]
buildCommand = "npm run build"

[deploy]
startCommand = "node scripts/start.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
